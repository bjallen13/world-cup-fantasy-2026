<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Fantasy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-10">
        
        <header class="text-center py-6">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-emerald-500 tracking-tight drop-shadow-sm">
                World Cup 2026 Fantasy League
            </h1>
        </header>

        <!-- TOP: Leaderboard -->
        <section class="bg-white rounded-2xl shadow-xl p-6 border-t-4 border-indigo-500">
            <h2 class="text-3xl font-black mb-6 text-indigo-900 flex items-center">
                <span class="mr-3">🏆</span> Leaderboard
            </h2>
            <div class="overflow-x-auto rounded-lg border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-indigo-50 text-indigo-800 text-sm uppercase tracking-widest">
                            <th class="p-4 font-bold">Rank</th>
                            <th class="p-4 font-bold">Player</th>
                            <th class="p-4 font-bold text-center">Goal Diff (GD)</th>
                            <th class="p-4 font-bold text-right">Total Points</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-slate-100 bg-white">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- MIDDLE: Groups (2 Columns with thick dividers) -->
        <section>
            <h2 class="text-3xl font-black mb-6 text-emerald-800 flex items-center">
                <span class="mr-3">🌍</span> Group Standings
            </h2>
            <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- BOTTOM-UPPER: Live & Upcoming Matches -->
        <section class="bg-white rounded-2xl shadow-lg p-6 border-t-4 border-amber-400">
            <h2 class="text-2xl font-black mb-4 text-amber-600 flex items-center">
                <span class="mr-3">⏱️</span> Live & Upcoming Games
            </h2>
            <div id="upcoming-container" class="space-y-3">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- BOTTOM-LOWER: Completed Matches -->
        <section class="bg-slate-100 rounded-2xl p-6 border-t-4 border-slate-400 shadow-inner">
            <h2 class="text-2xl font-black mb-4 text-slate-700 flex items-center">
                <span class="mr-3">✅</span> Completed Games
            </h2>
            <div id="completed-container" class="space-y-3 opacity-80">
                <!-- Populated by JS -->
            </div>
        </section>

    </div>

    <script>
        const assignments = {
            "JP": ["Mexico", "Morocco", "Cape Verde", "Algeria"],
            "Fro": ["Scotland", "Spain", "Japan", "South Africa"],
            "Emma": ["Paraguay", "New Zealand", "Uruguay", "France"],
            "Eli": ["Canada", "Haiti", "Australia", "Netherlands"],
            "Andrew": ["Türkiye", "Ivory Coast", "Congo DR", "Argentina"],
            "Jane": ["Czechia", "Senegal", "Uzbekistan", "England"],
            "Claire": ["USA", "Saudi Arabia", "Norway", "Portugal"],
            "Rachel": ["Belgium", "Ecuador", "Ghana", "Panama"],
            "Carson": ["Iran", "Tunisia", "Jordan", "Colombia"],
            "Weston": ["Qatar", "Iraq", "Austria", "Croatia"],
            "Tobin": ["Switzerland", "Germany", "Egypt", "Curaçao"],
            "Blair": ["Brazil", "South Korea", "Bosnia and Herzegovina", "Sweden"] 
        };

        const groups = {
            "A": ["Mexico", "South Africa", "South Korea", "Czechia"],
            "B": ["Canada", "Switzerland", "Qatar", "Bosnia and Herzegovina"],
            "C": ["Brazil", "Morocco", "Haiti", "Scotland"],
            "D": ["USA", "Paraguay", "Australia", "Türkiye"],
            "E": ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
            "F": ["Netherlands", "Japan", "Tunisia", "Sweden"],
            "G": ["Belgium", "Egypt", "Iran", "New Zealand"],
            "H": ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"],
            "I": ["France", "Senegal", "Norway", "Iraq"],
            "J": ["Argentina", "Algeria", "Austria", "Jordan"],
            "K": ["Portugal", "Uzbekistan", "Colombia", "Congo DR"],
            "L": ["England", "Croatia", "Ghana", "Panama"]
        };

        function getOwner(teamName) {
            for (const [player, teams] of Object.entries(assignments)) {
                if (teams.includes(teamName)) return player;
            }
            return "Unassigned";
        }

        async function loadDashboard() {
            try {
                // Fetch the separate JSON file
                const response = await fetch('matches.json');
                const matches = await response.json();

                let teamStats = {};
                Object.values(groups).flat().forEach(team => {
                    teamStats[team] = { points: 0, gd: 0, owner: getOwner(team) };
                });

                // Calculate Points and GD
                matches.forEach(m => {
                    if (m.status === "final" && m.homeScore !== null && m.awayScore !== null) {
                        const hScore = parseInt(m.homeScore);
                        const aScore = parseInt(m.awayScore);
                        
                        teamStats[m.home].gd += (hScore - aScore);
                        teamStats[m.away].gd += (aScore - hScore);

                        if (hScore > aScore) teamStats[m.home].points += 3;
                        else if (hScore < aScore) teamStats[m.away].points += 3;
                        else {
                            teamStats[m.home].points += 1;
                            teamStats[m.away].points += 1;
                        }
                    }
                });

                // Render Leaderboard
                let playerStats = {};
                for (const player in assignments) playerStats[player] = { points: 0, gd: 0 };
                
                for (const [team, stats] of Object.entries(teamStats)) {
                    if (stats.owner !== "Unassigned") {
                        playerStats[stats.owner].points += stats.points;
                        playerStats[stats.owner].gd += stats.gd;
                    }
                }

                // Sort: Points first, GD second
                const sortedPlayers = Object.entries(playerStats).sort((a, b) => {
                    if (b[1].points === a[1].points) return b[1].gd - a[1].gd;
                    return b[1].points - a[1].points;
                });

                const leaderboardBody = document.getElementById('leaderboard-body');
                sortedPlayers.forEach(([player, stats], index) => {
                    const isTop = index === 0 ? "bg-amber-50 font-bold" : "hover:bg-slate-50 transition-colors";
                    const rankColor = index === 0 ? "text-amber-500 text-xl" : "text-slate-500";
                    const gdColor = stats.gd > 0 ? "text-emerald-600 font-bold" : (stats.gd < 0 ? "text-rose-600 font-bold" : "text-slate-400");
                    
                    leaderboardBody.innerHTML += `
                        <tr class="${isTop}">
                            <td class="p-4 border-t ${rankColor}">${index + 1}</td>
                            <td class="p-4 border-t text-slate-800 text-lg">${player}</td>
                            <td class="p-4 border-t text-center ${gdColor}">${stats.gd > 0 ? '+'+stats.gd : stats.gd}</td>
                            <td class="p-4 border-t font-black text-indigo-700 text-right text-xl">${stats.points}</td>
                        </tr>
                    `;
                });

                // Render Groups (Two Columns)
                const groupsContainer = document.getElementById('groups-container');
                for (const [groupName, teams] of Object.entries(groups)) {
                    const sortedTeams = teams.sort((a, b) => {
                        if (teamStats[b].points === teamStats[a].points) return teamStats[b].gd - teamStats[a].gd;
                        return teamStats[b].points - teamStats[a].points;
                    });
                    
                    let groupHtml = `
                        <div class="bg-white rounded-2xl shadow-md border-2 border-slate-100 overflow-hidden transform transition hover:scale-[1.02]">
                            <div class="bg-gradient-to-r from-emerald-600 to-teal-500 text-white p-3 font-black text-center text-lg tracking-wider">
                                GROUP ${groupName}
                            </div>
                            <ul class="divide-y divide-slate-100">
                    `;
                    
                    sortedTeams.forEach(team => {
                        const gd = teamStats[team].gd;
                        const gdDisplay = gd > 0 ? `+${gd}` : gd;
                        groupHtml += `
                            <li class="p-4 flex justify-between items-center text-sm">
                                <div>
                                    <span class="font-bold text-slate-800 text-base block">${team}</span>
                                    <span class="text-xs font-semibold text-indigo-500 uppercase tracking-wide">${teamStats[team].owner}</span>
                                </div>
                                <div class="flex items-center space-x-3">
                                    <span class="text-xs font-bold text-slate-400 w-8 text-right">GD: ${gdDisplay}</span>
                                    <span class="font-black bg-emerald-50 px-3 py-1 rounded text-emerald-700 w-16 text-center shadow-sm border border-emerald-100">${teamStats[team].points} pt</span>
                                </div>
                            </li>
                        `;
                    });
                    
                    groupHtml += `</ul></div>`;
                    groupsContainer.innerHTML += groupHtml;
                }

                // Render Schedules
                const upcomingContainer = document.getElementById('upcoming-container');
                const completedContainer = document.getElementById('completed-container');
                
                matches.forEach(m => {
                    const isFinal = m.status === "final";
                    
                    let matchHtml = `
                        <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-slate-200 shadow-sm">
                            <div class="w-1/5 text-sm font-bold text-slate-500">${m.date}</div>
                            <div class="w-3/5 flex items-center justify-center space-x-6 text-lg">
                                <span class="font-bold text-right w-1/3 text-slate-800">${m.home}</span>
                    `;

                    if (isFinal) {
                        matchHtml += `<span class="font-black px-4 py-1 bg-slate-800 text-white rounded-lg shadow-md">${m.homeScore} - ${m.awayScore}</span>`;
                    } else {
                        matchHtml += `<span class="text-amber-500 font-black px-4 py-1 bg-amber-50 rounded-lg border border-amber-200">VS</span>`;
                    }

                    matchHtml += `
                                <span class="font-bold text-left w-1/3 text-slate-800">${m.away}</span>
                            </div>
                        </div>
                    `;

                    if (isFinal) completedContainer.innerHTML += matchHtml;
                    else upcomingContainer.innerHTML += matchHtml;
                });

            } catch (error) {
                console.error("Error loading match data:", error);
                document.getElementById('upcoming-container').innerHTML = `<p class="text-rose-500 p-4 bg-rose-50 rounded">Waiting for matches.json to be created or data is formatted incorrectly.</p>`;
            }
        }

        // Initialize
        loadDashboard();
    </script>
</body>
</html>
