<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Fantasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans md:p-4 pb-20 md:pb-8">
    <div class="max-w-5xl mx-auto">
        
        <header class="text-center py-6 px-4 border-b border-slate-200 bg-white sticky top-0 z-40 shadow-sm md:rounded-b-2xl md:mb-6">
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-emerald-500 tracking-tight drop-shadow-sm mb-4">
                World Cup 2026 Fantasy
            </h1>
            <a href="https://script.google.com/macros/s/AKfycby9Skk0GddGhXeF0hkCAWUGa7ZeApxLJabV2nnUyYuL4OddI8W2pzKLFC11s7kJu2xM/exec" target="_blank" class="inline-block bg-slate-800 hover:bg-indigo-600 text-white text-sm font-bold py-2 px-6 rounded-full shadow transition-colors">
                📝 Update Scores
            </a>
            
            <!-- FIXED: Optimized spacing, text-size, and labels for flawless mobile fit without horizontal scrolling -->
            <div class="flex justify-center mt-6 space-x-1 md:space-x-4 pb-2">
                <button onclick="switchTab('leaderboard')" id="nav-leaderboard" class="nav-btn flex-1 md:flex-none px-2 md:px-4 py-2 rounded-lg font-bold text-xs md:text-sm bg-indigo-100 text-indigo-700 transition-colors whitespace-nowrap">🏆 Standings</button>
                <button onclick="switchTab('groups')" id="nav-groups" class="nav-btn flex-1 md:flex-none px-2 md:px-4 py-2 rounded-lg font-bold text-xs md:text-sm text-slate-500 hover:bg-slate-100 transition-colors whitespace-nowrap">🌍 Groups</button>
                <button onclick="switchTab('matches')" id="nav-matches" class="nav-btn flex-1 md:flex-none px-2 md:px-4 py-2 rounded-lg font-bold text-xs md:text-sm text-slate-500 hover:bg-slate-100 transition-colors whitespace-nowrap">⚽ Matches</button>
                <button onclick="switchTab('knockout')" id="nav-knockout" class="nav-btn flex-1 md:flex-none px-2 md:px-4 py-2 rounded-lg font-bold text-xs md:text-sm text-slate-500 hover:bg-slate-100 transition-colors whitespace-nowrap">⚔️ Bracket</button>
            </div>
        </header>

        <div class="p-4 md:p-0 mt-4 md:mt-0 space-y-6">
            
            <section id="tab-leaderboard" class="tab-content active bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-indigo-50 border-b border-indigo-100 p-4">
                    <h2 class="text-xl font-black text-indigo-900">League Leaderboard</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white text-slate-400 text-xs uppercase tracking-widest border-b border-slate-100">
                                <th class="p-3 font-bold text-center w-12">Rank</th>
                                <th class="p-3 font-bold">Player</th>
                                <th class="p-3 font-bold text-center">GD</th>
                                <th class="p-3 font-bold text-right pr-6">PTS</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-groups" class="tab-content">
                <div id="groups-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6"></div>
            </section>

            <section id="tab-matches" class="tab-content space-y-8">
                <div class="flex justify-center space-x-2 bg-slate-200 p-1 rounded-lg w-fit mx-auto">
                    <button onclick="toggleMatchView('upcoming')" id="subnav-upcoming" class="px-4 py-1.5 rounded-md text-sm font-bold bg-white text-slate-800 shadow-sm">Upcoming</button>
                    <button onclick="toggleMatchView('completed')" id="subnav-completed" class="px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-800">Completed</button>
                </div>
                <div id="upcoming-container" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                <div id="completed-container" class="hidden grid grid-cols-1 md:grid-cols-2 gap-3 opacity-90"></div>
            </section>

            <section id="tab-knockout" class="tab-content space-y-4">
                <div class="bg-slate-800 text-white rounded-xl p-4 text-center shadow-sm">
                    <h2 class="text-xl font-black tracking-wide">Round of 32</h2>
                    <p class="text-xs font-bold text-slate-300 mt-1">Matchups will be updated when the group stage concludes.</p>
                </div>
                <div id="knockout-container" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </section>

        </div>
    </div>

    <!-- MINIMALIST MODAL POPUP -->
    <div id="team-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-5 w-full max-w-sm max-h-[80vh] overflow-y-auto relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 font-bold hover:bg-slate-200 transition-colors">✕</button>
            <h2 id="modal-title" class="text-xl font-black text-indigo-900 border-b border-slate-100 pb-2 mb-3 pr-8"></h2>
            <div id="modal-content" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1SLHXplp1fxpzq701dXr6rX4ImwXcM2-vLBjPiv23LKI/export?format=csv&gid=0";

        const assignments = {
            "JP": ["Mexico", "Morocco", "Cape Verde", "Algeria"],
            "Fro": ["Scotland", "Spain", "Japan", "South Africa"],
            "Emma": ["Paraguay", "New Zealand", "Uruguay", "France"],
            "Eli": ["Canada", "Haiti", "Australia", "Netherlands"],
            "Andrew": ["Türkiye", "Ivory Coast", "Congo DR", "Argentina"],
            "Jane": ["Czechia", "Senegal", "Uzbekistan", "England"],
            "Claire": ["USA", "Saudi Arabia", "Norway", "Portugal"],
            "Rachel": ["Belgium", "Ecuador", "Ghana", "Panama"],
            "Carson": ["Iran", "Tunisia", "Jordan", "Colombia"],
            "Weston": ["Qatar", "Iraq", "Austria", "Croatia"],
            "Tobin": ["Switzerland", "Germany", "Egypt", "Curaçao"],
            "Blair": ["Brazil", "South Korea", "Bosnia and Herzegovina", "Sweden"] 
        };

        const groups = {
            "A": ["Mexico", "South Africa", "South Korea", "Czechia"],
            "B": ["Canada", "Switzerland", "Qatar", "Bosnia and Herzegovina"],
            "C": ["Brazil", "Morocco", "Haiti", "Scotland"],
            "D": ["USA", "Paraguay", "Australia", "Türkiye"],
            "E": ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
            "F": ["Netherlands", "Japan", "Tunisia", "Sweden"],
            "G": ["Belgium", "Egypt", "Iran", "New Zealand"],
            "H": ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"],
            "I": ["France", "Senegal", "Norway", "Iraq"],
            "J": ["Argentina", "Algeria", "Austria", "Jordan"],
            "K": ["Portugal", "Uzbekistan", "Colombia", "Congo DR"],
            "L": ["England", "Croatia", "Ghana", "Panama"]
        };

        const knockoutMatches = [
            { home: "1st Group A", away: "Wildcard" },
            { home: "2nd Group A", away: "2nd Group B" },
            { home: "1st Group B", away: "Wildcard" },
            { home: "1st Group C", away: "Wildcard" },
            { home: "2nd Group C", away: "2nd Group D" },
            { home: "1st Group D", away: "Wildcard" },
            { home: "1st Group E", away: "Wildcard" },
            { home: "2nd Group E", away: "2nd Group F" },
            { home: "1st Group F", away: "Wildcard" },
            { home: "1st Group G", away: "Wildcard" },
            { home: "2nd Group G", away: "2nd Group H" },
            { home: "1st Group H", away: "Wildcard" },
            { home: "1st Group I", away: "Wildcard" },
            { home: "2nd Group I", away: "2nd Group J" },
            { home: "1st Group J", away: "2nd Group K" },
            { home: "1st Group K", away: "1st Group L" } 
        ];

        let localMatchesState = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-indigo-100', 'text-indigo-700');
                el.classList.add('text-slate-500', 'hover:bg-slate-100');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');
            const activeBtn = document.getElementById(`nav-${tabId}`);
            activeBtn.classList.remove('text-slate-500', 'hover:bg-slate-100');
            activeBtn.classList.add('bg-indigo-100', 'text-indigo-700');
        }

        function toggleMatchView(view) {
            if(view === 'upcoming') {
                document.getElementById('upcoming-container').classList.remove('hidden');
                document.getElementById('completed-container').classList.add('hidden');
                document.getElementById('subnav-upcoming').className = "px-4 py-1.5 rounded-md text-sm font-bold bg-white text-slate-800 shadow-sm";
                document.getElementById('subnav-completed').className = "px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-800";
            } else {
                document.getElementById('upcoming-container').classList.add('hidden');
                document.getElementById('completed-container').classList.remove('hidden');
                document.getElementById('subnav-completed').className = "px-4 py-1.5 rounded-md text-sm font-bold bg-white text-slate-800 shadow-sm";
                document.getElementById('subnav-upcoming').className = "px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-800";
            }
        }

        function openModal(teamName) {
            document.getElementById('modal-title').innerText = teamName + " Matches";
            const content = document.getElementById('modal-content');
            content.innerHTML = "";
            
            const teamMatches = localMatchesState.filter(m => m.home === teamName || m.away === teamName);
            
            if(teamMatches.length === 0) {
                content.innerHTML = `<div class="text-sm text-slate-500">No matches found.</div>`;
            } else {
                teamMatches.forEach(m => {
                    const isFinal = m.status === 'final';
                    const displayScore = isFinal ? `${m.homeScore ?? '-'} - ${m.awayScore ?? '-'}` : 'vs';
                    
                    content.innerHTML += `
                        <div class="bg-slate-50 p-2 rounded border border-slate-100">
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">${m.date} ${isFinal ? '<span class="text-indigo-500">• FT</span>' : ''}</div>
                            <div class="flex justify-between items-center text-sm font-bold text-slate-800">
                                <span class="${m.home === teamName ? 'text-indigo-600' : ''}">${m.home}</span>
                                <span class="${isFinal ? 'text-slate-800' : 'text-slate-400'} px-2">${displayScore}</span>
                                <span class="${m.away === teamName ? 'text-indigo-600' : ''}">${m.away}</span>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('team-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('team-modal').classList.add('hidden');
        }

        function getOwner(teamName) {
            for (const [player, teams] of Object.entries(assignments)) {
                if (teams.includes(teamName)) return player;
            }
            return "Unassigned";
        }

        async function loadDashboard() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
                
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(',');
                    if (row.length >= 6) {
                        localMatchesState.push({
                            date: row[0].trim(),
                            home: row[1].trim(),
                            away: row[2].trim(),
                            homeScore: row[3].trim() === '' ? null : parseInt(row[3].trim()),
                            awayScore: row[4].trim() === '' ? null : parseInt(row[4].trim()),
                            status: row[5] ? row[5].trim().toLowerCase() : 'upcoming'
                        });
                    }
                }
                renderAllData();
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('upcoming-container').innerHTML = `<p class="text-rose-500 font-bold p-4 bg-rose-50 rounded border border-rose-200">Error: Cannot read Google Sheet.</p>`;
            }
        }

        function renderAllData() {
            let teamStats = {};
            Object.values(groups).flat().forEach(team => {
                teamStats[team] = { points: 0, gd: 0, owner: getOwner(team) };
            });

            localMatchesState.forEach(m => {
                if (m.status === "final" && m.homeScore !== null && m.awayScore !== null && !isNaN(m.homeScore) && !isNaN(m.awayScore)) {
                    teamStats[m.home].gd += (m.homeScore - m.awayScore);
                    teamStats[m.away].gd += (m.awayScore - m.homeScore);
                    if (m.homeScore > m.awayScore) teamStats[m.home].points += 3;
                    else if (m.homeScore < m.awayScore) teamStats[m.away].points += 3;
                    else {
                        teamStats[m.home].points += 1;
                        teamStats[m.away].points += 1;
                    }
                }
            });

            let playerStats = {};
            for (const player in assignments) playerStats[player] = { points: 0, gd: 0 };
            for (const [team, stats] of Object.entries(teamStats)) {
                if (stats.owner !== "Unassigned") {
                    playerStats[stats.owner].points += stats.points;
                    playerStats[stats.owner].gd += stats.gd;
                }
            }
            const sortedPlayers = Object.entries(playerStats).sort((a, b) => b[1].points === a[1].points ? b[1].gd - a[1].gd : b[1].points - a[1].points);
            
            const leaderboardBody = document.getElementById('leaderboard-body');
            leaderboardBody.innerHTML = "";
            sortedPlayers.forEach(([player, stats], index) => {
                const isTop = index === 0 ? "bg-amber-50 font-black" : "hover:bg-slate-50 font-semibold";
                const rankColor = index === 0 ? "text-amber-500 text-lg" : "text-slate-400";
                
                const playerTeams = assignments[player] || [];
                const teamPills = playerTeams.map(t => `<button onclick="openModal('${t}')" class="inline-block bg-blue-100 hover:bg-blue-200 text-blue-800 text-[10px] font-bold px-2 py-0.5 rounded-full mt-1 mr-1 whitespace-nowrap transition-colors text-left">${t}</button>`).join('');

                leaderboardBody.innerHTML += `
                    <tr class="${isTop}">
                        <td class="p-3 border-t text-center align-middle ${rankColor}">${index + 1}</td>
                        <td class="p-3 border-t text-slate-800 text-base py-3">
                            <div class="font-bold">${player}</div>
                            <div class="flex flex-wrap mt-0.5">${teamPills}</div>
                        </td>
                        <td class="p-3 border-t text-center text-sm align-middle ${stats.gd > 0 ? 'text-emerald-600' : (stats.gd < 0 ? 'text-rose-500' : 'text-slate-400')}">${stats.gd > 0 ? '+'+stats.gd : stats.gd}</td>
                        <td class="p-3 border-t text-indigo-700 text-right text-lg pr-6 align-middle">${stats.points}</td>
                    </tr>`;
            });

            const groupsContainer = document.getElementById('groups-container');
            groupsContainer.innerHTML = "";
            for (const [groupName, teams] of Object.entries(groups)) {
                const sortedTeams = teams.sort((a, b) => teamStats[b].points === teamStats[a].points ? teamStats[b].gd - teamStats[a].gd : teamStats[b].points - teamStats[a].points);
                let groupHtml = `<div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><div class="bg-slate-800 text-white py-2 px-3 font-black text-sm tracking-wider">GROUP ${groupName}</div><ul class="divide-y divide-slate-100">`;
                sortedTeams.forEach(team => {
                    groupHtml += `
                        <li class="p-3 flex justify-between items-center">
                            <div>
                                <button onclick="openModal('${team}')" class="font-bold text-slate-800 text-sm block hover:text-indigo-600 transition-colors text-left">${team}</button>
                                <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-wide">${teamStats[team].owner}</span>
                            </div>
                            <div class="flex items-center space-x-2"><span class="text-[11px] font-bold text-slate-400 w-6 text-right">${teamStats[team].gd > 0 ? '+'+teamStats[team].gd : teamStats[team].gd}</span><span class="font-black bg-slate-100 px-2 py-1 rounded text-slate-700 w-12 text-center text-xs border border-slate-200">${teamStats[team].points}</span></div>
                        </li>`;
                });
                groupsContainer.innerHTML += groupHtml + `</ul></div>`;
            }

            const upcomingContainer = document.getElementById('upcoming-container');
            const completedContainer = document.getElementById('completed-container');
            upcomingContainer.innerHTML = ""; completedContainer.innerHTML = "";
            
            localMatchesState.forEach(m => {
                const isFinal = m.status === "final";
                const matchCard = `
                    <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-2">
                            <span class="text-[11px] font-black text-slate-400 uppercase tracking-wide">${m.date}</span>
                            ${isFinal ? `<span class="text-[10px] font-black text-white bg-slate-800 px-2 py-0.5 rounded">FT</span>` : `<span class="text-[10px] font-black text-amber-600 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded">UPCOMING</span>`}
                        </div>
                        <div class="space-y-1.5">
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-800 text-sm">${m.home}</span>
                                <span class="font-black ${isFinal ? 'text-slate-800 text-base' : 'text-slate-300'}">${m.homeScore !== null ? m.homeScore : '-'}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-800 text-sm">${m.away}</span>
                                <span class="font-black ${isFinal ? 'text-slate-800 text-base' : 'text-slate-300'}">${m.awayScore !== null ? m.awayScore : '-'}</span>
                            </div>
                        </div>
                    </div>`;

                if (isFinal) {
                    completedContainer.innerHTML += matchCard;
                } else {
                    upcomingContainer.innerHTML += matchCard;
                }
            });

            const knockoutContainer = document.getElementById('knockout-container');
            knockoutContainer.innerHTML = "";
            knockoutMatches.forEach(m => {
                knockoutContainer.innerHTML += `
                    <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                        <div class="space-y-1.5 mt-1">
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-800 text-sm">${m.home}</span>
                                <span class="font-black text-slate-200">-</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-800 text-sm">${m.away}</span>
                                <span class="font-black text-slate-200">-</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        loadDashboard();
    </script>
</body>
</html>
