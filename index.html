<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Fantasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20">
    <div class="max-w-5xl mx-auto">
        <header class="text-center py-6 px-4 border-b border-slate-200 bg-white sticky top-0 z-40 shadow-sm md:rounded-b-2xl">
            <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">World Cup 2026 Fantasy</h1>
            <a href="https://script.google.com/macros/s/AKfycby9Skk0GddGhXeF0hkCAWUGa7ZeApxLJabV2nnUyYuL4OddI8W2pzKLFC11s7kJu2xM/exec" target="_blank" class="mt-4 inline-block bg-slate-800 text-white text-xs font-bold py-2 px-6 rounded-full">📝 Update Scores</a>
            <div class="flex justify-center mt-6 space-x-2">
                <button onclick="switchTab('leaderboard')" id="nav-leaderboard" class="nav-btn px-4 py-2 rounded-lg font-bold text-sm bg-indigo-100 text-indigo-700">🏆 Standings</button>
                <button onclick="switchTab('groups')" id="nav-groups" class="nav-btn px-4 py-2 rounded-lg font-bold text-sm text-slate-500">🌍 Groups</button>
                <button onclick="switchTab('matches')" id="nav-matches" class="nav-btn px-4 py-2 rounded-lg font-bold text-sm text-slate-500">⚽ Matches</button>
            </div>
        </header>

        <div class="p-4 space-y-6">
            <section id="tab-leaderboard" class="tab-content active bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
                <table class="w-full text-left">
                    <tbody id="leaderboard-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </section>
            <section id="tab-groups" class="tab-content grid grid-cols-1 sm:grid-cols-2 gap-4" id="groups-container"></section>
            <section id="tab-matches" class="tab-content space-y-4">
                <div id="upcoming-container" class="grid gap-3"></div>
                <div id="completed-container" class="grid gap-3 opacity-90"></div>
            </section>
        </div>
    </div>

    <div id="team-modal" class="modal">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm mx-4 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4"><h2 id="modal-title" class="text-xl font-black">Team</h2><button onclick="closeModal()" class="font-bold text-slate-400">✕</button></div>
            <div id="modal-content" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1SLHXplp1fxpzq701dXr6rX4ImwXcM2-vLBjPiv23LKI/export?format=csv&gid=0";
        const assignments = { "JP": ["Mexico", "Morocco", "Cape Verde", "Algeria"], "Fro": ["Scotland", "Spain", "Japan", "South Africa"], "Emma": ["Paraguay", "New Zealand", "Uruguay", "France"], "Eli": ["Canada", "Haiti", "Australia", "Netherlands"], "Andrew": ["Türkiye", "Ivory Coast", "Congo DR", "Argentina"], "Jane": ["Czechia", "Senegal", "Uzbekistan", "England"], "Claire": ["USA", "Saudi Arabia", "Norway", "Portugal"], "Rachel": ["Belgium", "Ecuador", "Ghana", "Panama"], "Carson": ["Iran", "Tunisia", "Jordan", "Colombia"], "Weston": ["Qatar", "Iraq", "Austria", "Croatia"], "Tobin": ["Switzerland", "Germany", "Egypt", "Curaçao"], "Blair": ["Brazil", "South Korea", "Bosnia and Herzegovina", "Sweden"] };
        const groups = { "A": ["Mexico", "South Africa", "South Korea", "Czechia"], "B": ["Canada", "Switzerland", "Qatar", "Bosnia and Herzegovina"], "C": ["Brazil", "Morocco", "Haiti", "Scotland"], "D": ["USA", "Paraguay", "Australia", "Türkiye"], "E": ["Germany", "Curaçao", "Ivory Coast", "Ecuador"], "F": ["Netherlands", "Japan", "Tunisia", "Sweden"], "G": ["Belgium", "Egypt", "Iran", "New Zealand"], "H": ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"], "I": ["France", "Senegal", "Norway", "Iraq"], "J": ["Argentina", "Algeria", "Austria", "Jordan"], "K": ["Portugal", "Uzbekistan", "Colombia", "Congo DR"], "L": ["England", "Croatia", "Ghana", "Panama"] };
        let localMatchesState = [];

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('bg-indigo-100', 'text-indigo-700'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('nav-'+t).classList.add('bg-indigo-100', 'text-indigo-700');
        }

        async function loadData() {
            const res = await fetch(GOOGLE_SHEET_CSV_URL);
            const csv = await res.text();
            const lines = csv.split(/\r?\n/).slice(1);
            lines.forEach(l => {
                const r = l.split(',');
                if(r.length >= 6) localMatchesState.push({ date: r[0], home: r[1].trim(), away: r[2].trim(), homeScore: r[3] ? parseInt(r[3]) : null, awayScore: r[4] ? parseInt(r[4]) : null, status: r[5].trim().toLowerCase() });
            });
            render();
        }

        function render() {
            let stats = {}; Object.values(groups).flat().forEach(t => stats[t] = { pts: 0, gd: 0 });
            localMatchesState.forEach(m => {
                if(m.status === 'final' && m.homeScore !== null) {
                    stats[m.home].gd += (m.homeScore - m.awayScore); stats[m.away].gd += (m.awayScore - m.homeScore);
                    if(m.homeScore > m.awayScore) { stats[m.home].pts += 3; } else if(m.homeScore < m.awayScore) { stats[m.away].pts += 3; } else { stats[m.home].pts += 1; stats[m.away].pts += 1; }
                }
            });

            const body = document.getElementById('leaderboard-body');
            Object.entries(assignments).forEach(([p, teams]) => {
                let pts = teams.reduce((acc, t) => acc + stats[t].pts, 0);
                body.innerHTML += `<tr><td class="p-3 font-bold">${p}<div class="flex flex-wrap gap-1 mt-1">${teams.map(t => `<button onclick="openModal('${t}')" class="bg-slate-100 text-[9px] px-1.5 py-0.5 rounded">${t}</button>`).join('')}</div></td><td class="text-right font-black text-xl text-indigo-600">${pts}</td></tr>`;
            });

            const gCont = document.getElementById('tab-groups');
            Object.entries(groups).forEach(([n, teams]) => {
                gCont.innerHTML += `<div class="bg-white p-3 rounded-xl border border-slate-200"><h3 class="font-black text-xs mb-2">GROUP ${n}</h3>${teams.map(t => `<button onclick="openModal('${t}')" class="block text-sm font-bold py-1 underline">${t}</button>`).join('')}</div>`;
            });

            localMatchesState.forEach(m => {
                const card = `<div class="bg-white p-3 rounded-xl border border-slate-200 text-xs"><div class="flex justify-between font-bold text-slate-400 mb-1 uppercase">${m.date} ${m.status === 'final' ? '• FT' : ''}</div><div class="flex justify-between font-bold">${m.home} <span>${m.homeScore ?? '-'}</span></div><div class="flex justify-between font-bold">${m.away} <span>${m.awayScore ?? '-'}</span></div></div>`;
                if(m.status === 'final') document.getElementById('completed-container').innerHTML += card;
                else document.getElementById('upcoming-container').innerHTML += card;
            });
        }
        function openModal(t) {
            document.getElementById('modal-title').innerText = t;
            const content = document.getElementById('modal-content');
            content.innerHTML = localMatchesState.filter(m => m.home === t || m.away === t).map(m => `<div class="text-xs p-2 border-b">${m.date}: ${m.home} ${m.homeScore ?? ''} - ${m.awayScore ?? ''} ${m.away}</div>`).join('');
            document.getElementById('team-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('team-modal').classList.remove('active'); }
        loadData();
    </script>
</body>
</html>
