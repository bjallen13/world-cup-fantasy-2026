<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Fantasy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4">
    <div class="max-w-4xl mx-auto space-y-8">
        <!-- Header -->
        <header class="text-center">
            <h1 class="text-3xl font-black text-indigo-600">World Cup 2026 Fantasy</h1>
            <a href="https://script.google.com/macros/s/AKfycby9Skk0GddGhXeF0hkCAWUGa7ZeApxLJabV2nnUyYuL4OddI8W2pzKLFC11s7kJu2xM/exec" target="_blank" class="text-xs font-bold underline mt-2 block">📝 Update Scores</a>
        </header>

        <!-- Leaderboard -->
        <section class="bg-white p-4 rounded-2xl shadow">
            <h2 class="text-xl font-black mb-4">🏆 Leaderboard</h2>
            <table class="w-full text-left">
                <tbody id="leaderboard-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </section>

        <!-- Groups -->
        <section id="groups-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></section>
    </div>

    <!-- Modal -->
    <div id="team-modal" class="modal">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm mx-4">
            <div class="flex justify-between mb-4"><h2 id="modal-title" class="font-black">Team</h2><button onclick="document.getElementById('team-modal').classList.remove('active')" class="font-bold">✕</button></div>
            <div id="modal-content" class="text-sm space-y-2"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1SLHXplp1fxpzq701dXr6rX4ImwXcM2-vLBjPiv23LKI/export?format=csv&gid=0";
        const assignments = { "JP": ["Mexico", "Morocco", "Cape Verde", "Algeria"], "Fro": ["Scotland", "Spain", "Japan", "South Africa"], "Emma": ["Paraguay", "New Zealand", "Uruguay", "France"], "Eli": ["Canada", "Haiti", "Australia", "Netherlands"], "Andrew": ["Türkiye", "Ivory Coast", "Congo DR", "Argentina"], "Jane": ["Czechia", "Senegal", "Uzbekistan", "England"], "Claire": ["USA", "Saudi Arabia", "Norway", "Portugal"], "Rachel": ["Belgium", "Ecuador", "Ghana", "Panama"], "Carson": ["Iran", "Tunisia", "Jordan", "Colombia"], "Weston": ["Qatar", "Iraq", "Austria", "Croatia"], "Tobin": ["Switzerland", "Germany", "Egypt", "Curaçao"], "Blair": ["Brazil", "South Korea", "Bosnia and Herzegovina", "Sweden"] };
        const groups = { "A": ["Mexico", "South Africa", "South Korea", "Czechia"], "B": ["Canada", "Switzerland", "Qatar", "Bosnia and Herzegovina"], "C": ["Brazil", "Morocco", "Haiti", "Scotland"], "D": ["USA", "Paraguay", "Australia", "Türkiye"], "E": ["Germany", "Curaçao", "Ivory Coast", "Ecuador"], "F": ["Netherlands", "Japan", "Tunisia", "Sweden"], "G": ["Belgium", "Egypt", "Iran", "New Zealand"], "H": ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"], "I": ["France", "Senegal", "Norway", "Iraq"], "J": ["Argentina", "Algeria", "Austria", "Jordan"], "K": ["Portugal", "Uzbekistan", "Colombia", "Congo DR"], "L": ["England", "Croatia", "Ghana", "Panama"] };
        let matches = [];

        async function load() {
            const res = await fetch(GOOGLE_SHEET_CSV_URL);
            const csv = await res.text();
            const lines = csv.split(/\r?\n/).slice(1);
            lines.forEach(l => {
                const r = l.split(',');
                if(r.length >= 6) matches.push({ date: r[0], home: r[1].trim(), away: r[2].trim(), hScore: r[3] ? parseInt(r[3]) : null, aScore: r[4] ? parseInt(r[4]) : null, status: r[5].trim().toLowerCase() });
            });
            render();
        }

        function render() {
            let stats = {}; Object.values(groups).flat().forEach(t => stats[t] = { pts: 0, gd: 0 });
            matches.forEach(m => {
                if(m.status === 'final' && m.hScore !== null) {
                    stats[m.home].gd += (m.hScore - m.aScore); stats[m.away].gd += (m.aScore - m.hScore);
                    if(m.hScore > m.aScore) { stats[m.home].pts += 3; } else if(m.hScore < m.aScore) { stats[m.away].pts += 3; } else { stats[m.home].pts += 1; stats[m.away].pts += 1; }
                }
            });

            // Leaderboard
            const body = document.getElementById('leaderboard-body');
            let sorted = Object.entries(assignments).map(([p, teams]) => ({ p, pts: teams.reduce((acc, t) => acc + stats[t].pts, 0), gd: teams.reduce((acc, t) => acc + stats[t].gd, 0), teams }))
                .sort((a,b) => b.pts - a.pts || b.gd - a.gd);
            
            sorted.forEach(item => {
                body.innerHTML += `<tr><td class="p-3 font-bold">${item.p}<div class="flex flex-wrap gap-1 mt-1">${item.teams.map(t => `<button onclick="showTeam('${t}')" class="bg-slate-100 text-[9px] px-1 rounded">${t}</button>`).join('')}</div></td><td class="text-right font-black text-indigo-600">${item.pts}</td></tr>`;
            });

            // Groups
            const gCont = document.getElementById('groups-container');
            Object.entries(groups).forEach(([name, teams]) => {
                gCont.innerHTML += `<div class="bg-white p-3 rounded-xl border border-slate-200"><h3 class="font-black text-xs mb-2">GROUP ${name}</h3>${teams.map(t => `<button onclick="showTeam('${t}')" class="block text-sm py-0.5 underline">${t} (${stats[t].pts} pts)</button>`).join('')}</div>`;
            });
        }

        function showTeam(t) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-content').innerHTML = matches.filter(m => m.home === t || m.away === t).map(m => `<div>${m.date}: ${m.home} ${m.hScore ?? ''} - ${m.aScore ?? ''} ${m.away}</div>`).join('');
            document.getElementById('team-modal').classList.add('active');
        }
        load();
    </script>
</body>
</html>
