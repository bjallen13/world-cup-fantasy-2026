<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Fantasy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-10">
        
        <header class="text-center py-6 border-b border-slate-200">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-emerald-500 tracking-tight drop-shadow-sm mb-4">
                World Cup 2026 Fantasy League
            </h1>
            <a href="https://script.google.com/macros/s/AKfycby9Skk0GddGhXeF0hkCAWUGa7ZeApxLJabV2nnUyYuL4OddI8W2pzKLFC11s7kJu2xM/exec" target="_blank" class="inline-block bg-slate-800 hover:bg-indigo-600 text-white font-bold py-2 px-6 rounded-xl shadow transition-colors">
                📝 Click Here to Update Scores
            </a>
        </header>

        <section class="bg-white rounded-2xl shadow-xl p-6 border-t-4 border-indigo-500">
            <h2 class="text-3xl font-black mb-6 text-indigo-900 flex items-center"><span class="mr-3">🏆</span> Leaderboard</h2>
            <div class="overflow-x-auto rounded-lg border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-indigo-50 text-indigo-800 text-sm uppercase tracking-widest">
                            <th class="p-4 font-bold">Rank</th>
                            <th class="p-4 font-bold">Player</th>
                            <th class="p-4 font-bold text-center">Goal Diff (GD)</th>
                            <th class="p-4 font-bold text-right">Total Points</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-slate-100 bg-white"></tbody>
                </table>
            </div>
        </section>

        <section>
            <h2 class="text-3xl font-black mb-6 text-emerald-800 flex items-center"><span class="mr-3">🌍</span> Group Standings</h2>
            <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12"></div>
        </section>

        <section class="bg-white rounded-2xl shadow-lg p-6 border-t-4 border-amber-400">
            <h2 class="text-2xl font-black mb-4 text-amber-600 flex items-center"><span class="mr-3">⏱️</span> Live & Upcoming Games</h2>
            <div id="upcoming-container" class="space-y-4"></div>
        </section>

        <section class="bg-slate-100 rounded-2xl p-6 border-t-4 border-slate-400 shadow-inner">
            <h2 class="text-2xl font-black mb-4 text-slate-700 flex items-center"><span class="mr-3">✅</span> Completed Games</h2>
            <div id="completed-container" class="space-y-3 opacity-80"></div>
        </section>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1SLHXplp1fxpzq701dXr6rX4ImwXcM2-vLBjPiv23LKI/export?format=csv&gid=0";

        const assignments = {
            "JP": ["Mexico", "Morocco", "Cape Verde", "Algeria"],
            "Fro": ["Scotland", "Spain", "Japan", "South Africa"],
            "Emma": ["Paraguay", "New Zealand", "Uruguay", "France"],
            "Eli": ["Canada", "Haiti", "Australia", "Netherlands"],
            "Andrew": ["Türkiye", "Ivory Coast", "Congo DR", "Argentina"],
            "Jane": ["Czechia", "Senegal", "Uzbekistan", "England"],
            "Claire": ["USA", "Saudi Arabia", "Norway", "Portugal"],
            "Rachel": ["Belgium", "Ecuador", "Ghana", "Panama"],
            "Carson": ["Iran", "Tunisia", "Jordan", "Colombia"],
            "Weston": ["Qatar", "Iraq", "Austria", "Croatia"],
            "Tobin": ["Switzerland", "Germany", "Egypt", "Curaçao"],
            "Blair": ["Brazil", "South Korea", "Bosnia and Herzegovina", "Sweden"] 
        };

        const groups = {
            "A": ["Mexico", "South Africa", "South Korea", "Czechia"],
            "B": ["Canada", "Switzerland", "Qatar", "Bosnia and Herzegovina"],
            "C": ["Brazil", "Morocco", "Haiti", "Scotland"],
            "D": ["USA", "Paraguay", "Australia", "Türkiye"],
            "E": ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
            "F": ["Netherlands", "Japan", "Tunisia", "Sweden"],
            "G": ["Belgium", "Egypt", "Iran", "New Zealand"],
            "H": ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"],
            "I": ["France", "Senegal", "Norway", "Iraq"],
            "J": ["Argentina", "Algeria", "Austria", "Jordan"],
            "K": ["Portugal", "Uzbekistan", "Colombia", "Congo DR"],
            "L": ["England", "Croatia", "Ghana", "Panama"]
        };

        let localMatchesState = [];

        function getOwner(teamName) {
            for (const [player, teams] of Object.entries(assignments)) {
                if (teams.includes(teamName)) return player;
            }
            return "Unassigned";
        }

        async function loadDashboard() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const csvText = await response.text();
                
                // FIXED BUG 1: Properly split by actual line breaks
                const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
                
                for (let i = 1; i < lines.length; i++) {
                    // FIXED BUG 2: Clean, simple comma split without breaking team names
                    const row = lines[i].split(',');
                    
                    if (row.length >= 6) {
                        localMatchesState.push({
                            date: row[0].trim(),
                            home: row[1].trim(),
                            away: row[2].trim(),
                            homeScore: row[3].trim() === '' ? null : parseInt(row[3].trim()),
                            awayScore: row[4].trim() === '' ? null : parseInt(row[4].trim()),
                            status: row[5].trim().toLowerCase()
                        });
                    }
                }
                renderAllData();
            } catch (error) {
                console.error("Error loading data from Google Sheets:", error);
                document.getElementById('upcoming-container').innerHTML = `<p class="text-rose-500 font-bold p-4 bg-rose-50 rounded">Failed to load data. Make sure your Google Sheet is shared properly.</p>`;
            }
        }

        function renderAllData() {
            let teamStats = {};
            Object.values(groups).flat().forEach(team => {
                teamStats[team] = { points: 0, gd: 0, owner: getOwner(team) };
            });

            localMatchesState.forEach(m => {
                if (m.status === "final" && m.homeScore !== null && m.awayScore !== null && !isNaN(m.homeScore) && !isNaN(m.awayScore)) {
                    teamStats[m.home].gd += (m.homeScore - m.awayScore);
                    teamStats[m.away].gd += (m.awayScore - m.homeScore);
                    if (m.homeScore > m.awayScore) teamStats[m.home].points += 3;
                    else if (m.homeScore < m.awayScore) teamStats[m.away].points += 3;
                    else {
                        teamStats[m.home].points += 1;
                        teamStats[m.away].points += 1;
                    }
                }
            });

            // Leaderboard Render
            let playerStats = {};
            for (const player in assignments) playerStats[player] = { points: 0, gd: 0 };
            for (const [team, stats] of Object.entries(teamStats)) {
                if (stats.owner !== "Unassigned") {
                    playerStats[stats.owner].points += stats.points;
                    playerStats[stats.owner].gd += stats.gd;
                }
            }
            const sortedPlayers = Object.entries(playerStats).sort((a, b) => b[1].points === a[1].points ? b[1].gd - a[1].gd : b[1].points - a[1].points);
            const leaderboardBody = document.getElementById('leaderboard-body');
            leaderboardBody.innerHTML = "";
            sortedPlayers.forEach(([player, stats], index) => {
                const isTop = index === 0 ? "bg-amber-50 font-bold" : "hover:bg-slate-50 transition-colors";
                leaderboardBody.innerHTML += `
                    <tr class="${isTop}">
                        <td class="p-4 border-t text-slate-500">${index + 1}</td>
                        <td class="p-4 border-t text-slate-800 text-lg font-bold">${player}</td>
                        <td class="p-4 border-t text-center ${stats.gd > 0 ? 'text-emerald-600 font-bold' : (stats.gd < 0 ? 'text-rose-600 font-bold' : 'text-slate-400')}">${stats.gd > 0 ? '+'+stats.gd : stats.gd}</td>
                        <td class="p-4 border-t font-black text-indigo-700 text-right text-xl">${stats.points}</td>
                    </tr>`;
            });

            // Render Groups
            const groupsContainer = document.getElementById('groups-container');
            groupsContainer.innerHTML = "";
            for (const [groupName, teams] of Object.entries(groups)) {
                const sortedTeams = teams.sort((a, b) => teamStats[b].points === teamStats[a].points ? teamStats[b].gd - teamStats[a].gd : teamStats[b].points - teamStats[a].points);
                let groupHtml = `<div class="bg-white rounded-2xl shadow-md border-2 border-slate-100 overflow-hidden"><div class="bg-gradient-to-r from-emerald-600 to-teal-500 text-white p-3 font-black text-center text-lg tracking-wider">GROUP ${groupName}</div><ul class="divide-y divide-slate-100">`;
                sortedTeams.forEach(team => {
                    groupHtml += `
                        <li class="p-4 flex justify-between items-center text-sm">
                            <div><span class="font-bold text-slate-800 text-base block">${team}</span><span class="text-xs font-semibold text-indigo-500 uppercase tracking-wide">${teamStats[team].owner}</span></div>
                            <div class="flex items-center space-x-3"><span class="text-xs font-bold text-slate-400 w-8 text-right">GD: ${teamStats[team].gd > 0 ? '+'+teamStats[team].gd : teamStats[team].gd}</span><span class="font-black bg-emerald-50 px-3 py-1 rounded text-emerald-700 w-16 text-center shadow-sm border border-emerald-100">${teamStats[team].points} pt</span></div>
                        </li>`;
                });
                groupsContainer.innerHTML += groupHtml + `</ul></div>`;
            }

            // Render Schedules
            const upcomingContainer = document.getElementById('upcoming-container');
            const completedContainer = document.getElementById('completed-container');
            upcomingContainer.innerHTML = ""; completedContainer.innerHTML = "";
            
            localMatchesState.forEach(m => {
                if (m.status === "final") {
                    completedContainer.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-slate-200 shadow-sm">
                            <div class="w-1/4 text-sm font-bold text-slate-500">${m.date}</div>
                            <div class="w-3/4 flex items-center justify-center space-x-6 text-lg">
                                <span class="font-bold text-right w-1/3 text-slate-800 truncate">${m.home}</span>
                                <span class="font-black px-4 py-1 bg-slate-800 text-white rounded-lg shadow-md">${m.homeScore} - ${m.awayScore}</span>
                                <span class="font-bold text-left w-1/3 text-slate-800 truncate">${m.away}</span>
                            </div>
                        </div>`;
                } else {
                    upcomingContainer.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-slate-200 shadow-sm">
                            <div class="w-1/4 text-sm font-bold text-slate-500">${m.date}</div>
                            <div class="w-3/4 flex items-center justify-center space-x-6 text-lg">
                                <span class="font-bold text-right w-1/3 text-slate-800 truncate">${m.home}</span>
                                <span class="text-amber-500 font-black px-4 py-1 bg-amber-50 rounded-lg border border-amber-200 shadow-sm">VS</span>
                                <span class="font-bold text-left w-1/3 text-slate-800 truncate">${m.away}</span>
                            </div>
                        </div>`;
                }
            });
        }

        loadDashboard();
    </script>
</body>
</html>
